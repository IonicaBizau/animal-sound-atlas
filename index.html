<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Animal Sounds Across Languages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="wrap">
  <header>
    <h1>Animal Sounds</h1>
    <p>How animals speak across languages — a side-by-side onomatopoeia atlas. Hover any sound to see its IPA.</p>
  </header>
  <div class="controls">
    <div class="row">
      <input id="q" type="search" placeholder="Search animal or sound (e.g. duck, mac, woof)…">
      <div class="meta" id="meta"></div>
    </div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="tablewrap"><div class="grid" id="grid"></div></div>
  <footer>Static build · hover cells for IPA · data approximate &amp; stylized.</footer>
</div>
<script src="./main.js"></script>
</body>
</html>
